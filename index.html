<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Positioning | Lesson</title>
  </head>
  <body>
    <div class="container">
      <div class="subcontainer">
        <div class="code">
          <img class="dev_icon" src="dev.png" alt="" />
        </div>
        <div class="important">
          <h2 class="important_line important_hello">Hello👋 I am,</h2>
          <h1 class="important_line important_name">JEAN CHRISTAR,</h1>
          <h2 class="important_line important_developer">
            <span class="red">A</span> Frontend Developer
          </h2>
          <p class="important_line important_paragraph">
            Expert en <span class="red">HTML5</span>,<span class="red"
              >CSS3</span
            >
            et <span class="red">JavaScript</span>. <br />Base a Bujumbura, je
            transforme des <br />
            idees an interfaces reelles.
          </p>
          <button class="important_line important_btn">Contact me</button>
          <p class="footer_paragraph">HOGI ACADEMY - SCHOOL OF CODE - 2026</p>
        </div>
        <div class="images">
          <div class="imag_1">
            <img class="pattern_1 pattern" src="pattern.png" alt="" />
          </div>
          <div class="imag_2">
            <img class="avatar" src="SLAK.jpg" alt="" />
          </div>
          <div class="imag_3">
            <img class="pattern_2 pattern" src="pattern.png" alt="" />
          </div>
        </div>
        <footer>
          <p class="icon_top"></p>
          <p class="sub_icon_top"></p>
        </footer>
        <div class="white_line"></div>
      </div>
    </div>
  </body>
</html>
